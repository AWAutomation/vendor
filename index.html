[data-tip]::after {
  content: attr(data-tip);
  position: absolute;
  left: 50%;
  bottom: calc(100% + 10px);
  z-index: 20;
  width: min(320px, 80vw);
  padding: 10px 12px;
  border: 1px solid rgba(148, 163, 184, 0.30);
  border-radius: var(--radius-sm);
  background: rgba(6, 10, 15, 0.96);
  color: var(--text);
  box-shadow: 0 16px 44px rgba(0,0,0,0.45);
  font-size: 12px;
  line-height: 1.35;
  text-transform: none;
  letter-spacing: 0;
  white-space: normal;
  pointer-events: none;
  opacity: 0;
  transform: translate(-50%, 6px);
  transition: opacity 0.16s ease, transform 0.16s ease;
}
[data-tip]:hover::after,
[data-tip]:focus-visible::after {
  opacity: 1;
  transform: translate(-50%, 0);
}
@media (max-width: 1400px) {

<div class="wrap">
  <div class="panel hero">
    <h1>Vendor Directory</h1>
    <p class="subhead">Search and filter across vendors, offerings, contacts, phone numbers, websites, and notes.</p>
    <div class="grid">
      <input id="search" type="text" placeholder="Search all fields" data-tip="Search vendors, technologies, contacts, websites, phone numbers, notes, and offerings at the same time.">
      <select id="category" data-tip="Filter by the broad technology family, such as storage, material movement, support technologies, or robotics."></select>

      <select id="vendor" data-tip="Filter to one vendor or manufacturer."></select>

      <select id="offering" data-tip="Filter by a specific product, platform, or capability."></select>

    </div>
    <div class="actions">

        <button id="compactBtn" type="button" data-tip="Switch between roomy cards and a denser scanning layout.">Compact view</button>
        <button id="exportBtn" type="button" data-tip="Download the currently visible records as a CSV file.">Export visible CSV</button>
      </div>
    </div>
    <div id="quickFilters" class="quick-filters" aria-label="Quick category filters"></div>
    <div class="stats">
      <div class="stat"><span id="visibleCount">0</span> visible</div>

  <div id="empty" class="panel empty">No matching records.</div>
</div>

<script>
(function () {
  var raw = document.getElementById('records-data').textContent || '[]';
  var records = JSON.parse(raw);
  var state = {
    showVideos: false,
    compact: false
  };

  var categoryDescriptions = {
    'Storage & Retrieval': 'Systems that store inventory densely and retrieve it with less walking, handling, and floor-space waste.',
    'Material Movement': 'Equipment that moves totes, cases, pallets, or products through a facility with conveyors, lifts, AMRs, AGVs, or packaging flow.',
    'Support Technologies': 'Enabling systems for identification, inspection, weighing, machine safety, and traceability around automation.',
    'Robotics': 'Industrial and collaborative robot applications for picking, packing, palletizing, and other repeatable handling tasks.'
  };

  var subcategoryDescriptions = {
    'Dense Piece Storage': 'Automated storage for individual parts or small items, often using vertical lift modules or carousels to bring inventory to an operator.',
    'Dense Tote/Case Storage': 'High-density automated storage and retrieval for totes or cases, usually feeding goods-to-person picking or downstream automation.',
    'Dense Pallet Storage': 'Pallet shuttle, crane, or cube-style systems that store pallet loads compactly and reduce forklift travel.',
    'Goods-to-Person': 'Automation that brings inventory to a workstation so operators pick with less travel and better ergonomics.',
    'Mobile Racking Systems': 'Racks or shelving on movable bases that open aisles only when needed, increasing storage density.',
    'Fixed Conveyance': 'Installed conveyor systems that move product, totes, cartons, or pallets along defined paths.',
    'Mobile Conveyance': 'AMRs and AGVs that move materials without fixed conveyor, supporting flexible transport routes.',
    'Packaging': 'Equipment for erecting, sealing, wrapping, bagging, strapping, and preparing products or pallets for shipment.',
    'Identification': 'Barcode, label, print-and-apply, RFID, and weighing technologies that identify, track, and verify material flow.',
    'Safety': 'Devices and guarding that help protect people around machinery, conveyors, robots, and automated cells.',
    'Vision': 'Camera-based systems that inspect, identify, measure, guide, or verify products automatically.',
    'Robotic Picking': 'Robots that identify, grip, and pick items or cases to reduce repetitive manual picking work.',
    'Robotic Packing': 'Robots that place products into cartons, trays, bags, or other packaging formats.',
    'Robotic Palletizing': 'Robots that stack cases, bags, totes, or products onto pallets with consistent patterns and less manual lifting.'
  };

  var videoCatalog = {
    'Dense Piece Storage': { id: 'TSTs6pK70C8', label: 'Vertical lift module overview' },
    'Dense Tote/Case Storage': { id: 'zbtG5TTxy0c', label: 'Automated tote/case shuttle overview' },
    'Dense Pallet Storage': { id: 'UlXZYY53jv8', label: 'Pallet shuttle system overview' },
    'Goods-to-Person': { id: 'iHC9ec591lI', label: 'Goods-to-person automation overview' },
    'Mobile Racking Systems': { id: 'V0EhTQ2EuP8', label: 'Mobile racking system overview' },
    'Fixed Conveyance': { id: 'vuZEBjaR4b4', label: 'Warehouse conveyor overview' },
    'Mobile Conveyance': { id: 'qahujJ-8vdk', label: 'AMR and AGV comparison' },
    'Packaging': { id: 'lrE6FKRJ7Ys', label: 'Packaging automation overview' },
    'Identification': { id: 'cblm3kxAmsE', label: 'Warehouse identification overview' },
    'Safety': { id: 'bXfuZ2jcds4', label: 'Machine guarding and interlock overview' },
    'Vision': { id: '0Snnn6hp6yQ', label: 'Machine vision overview' },
    'Robotic Picking': { id: 'UtBa9yVZBJM', label: 'Robotic picking overview' },
    'Robotic Packing': { id: '8Gp7i2WkpEw', label: 'Robotic packing overview' },
    'Robotic Palletizing': { id: 'xvZ2nGJP1PA', label: 'Robotic palletizing overview' }
  };

  function el(id) {
    return document.getElementById(id);
  }

  function toArray(v) {
    if (Array.isArray(v)) return v;
    if (v === null || v === undefined || v === '') return [];
    return [v];
  }

  function text(v) {
    return v === null || v === undefined ? '' : String(v);
  }

  function esc(v) {
    return text(v)
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;')
      .replace(/'/g, '&#39;');
  }

  function tipAttr(value) {
    var v = text(value).trim();
    return v ? ' data-tip="' + esc(v) + '"' : '';
  }

  function uniq(values) {
    var seen = Object.create(null);
    var out = [];
    for (var i = 0; i < values.length; i++) {
      var value = text(values[i]).trim();
      if (value && !seen[value]) {
        seen[value] = true;
        out.push(value);
      }
    }
    out.sort(function(a, b) { return a.localeCompare(b); });
    return out;
  }

  function normalizeWebsite(url) {
    var u = text(url).trim();
    if (!u) return '';
    if (u.indexOf('http://') !== 0 && u.indexOf('https://') !== 0) {
      u = 'https://' + u.replace(/^\/+/, '');
    }
    return u.replace('https://www/', 'https://www.');
  }

  function formatPhone(value) {
    var raw = text(value).trim();
    if (!raw || raw === 'XXX-XXX-XXXX') return raw;
    if (raw.indexOf('+') === 0 && raw.indexOf('+1') !== 0) return raw;
    var digits = raw.replace(/\D/g, '');
    if (digits.length === 10) {
      return '+1 ' + digits.slice(0, 3) + '-' + digits.slice(3, 6) + '-' + digits.slice(6);
    }
    if (digits.length === 11 && digits.charAt(0) === '1') {
      return '+1 ' + digits.slice(1, 4) + '-' + digits.slice(4, 7) + '-' + digits.slice(7);
    }
    return raw;
  }

  function telHref(value) {
    return 'tel:' + text(value).replace(/[^\d+]/g, '');
  }

  function compactLabelFromUrl(url) {
    var clean = text(url).replace(/^https?:\/\//, '').replace(/^www\./, '').replace(/\/$/, '');
    return clean || text(url);
  }

  function prepRecord(r) {
    r.website = normalizeWebsite(r.website);
    r.phone = Array.isArray(r.phone) ? r.phone.map(formatPhone) : formatPhone(r.phone);
    r.mobile = Array.isArray(r.mobile) ? r.mobile.map(formatPhone) : formatPhone(r.mobile);
    return r;
  }

  for (var i = 0; i < records.length; i++) {
    prepRecord(records[i]);
  }

  function flattenField(v) {
    return toArray(v).join(' | ');
  }

  function offeringsText(r) {
    return toArray(r.offerings).join(' | ');
  }

  function searchBlob(r) {
    return [
      r.category,
      r.subcategory,
      r.vendor,
      flattenField(r.contact),
      flattenField(r.phone),
      flattenField(r.mobile),
      flattenField(r.email),
      r.website,
      r.notes,
      offeringsText(r)
    ].join(' | ').toLowerCase();
  }

  function setOptions(select, label, values) {
    var current = select.value || '';
    var html = '<option value="">' + esc(label) + '</option>';
    for (var i = 0; i < values.length; i++) {
      var value = values[i];
      html += '<option value="' + esc(value) + '"' + (value === current ? ' selected' : '') + '>' + esc(value) + '</option>';
    }
    select.innerHTML = html;
  }

  function collectValues(field) {
    var values = [];
    for (var i = 0; i < records.length; i++) {
      var arr = toArray(records[i][field]);
      for (var j = 0; j < arr.length; j++) values.push(arr[j]);
    }
    return uniq(values);
  }

  function populateFilters() {
    var categories = collectValues('category');
    setOptions(el('category'), 'All categories', categories);
    setOptions(el('subcategory'), 'All subcategories', collectValues('subcategory'));
    setOptions(el('vendor'), 'All vendors', collectValues('vendor'));
    setOptions(el('contact'), 'All contacts', collectValues('contact'));
    var offeringValues = [];
    for (var i = 0; i < records.length; i++) offeringValues = offeringValues.concat(toArray(records[i].offerings));
    setOptions(el('offering'), 'All offerings', uniq(offeringValues));
    var quickHtml = '<button class="quick-filter is-active" type="button" data-category=""' + tipAttr('Show every category in the directory.') + '>All</button>';
    for (var c = 0; c < categories.length; c++) {
      quickHtml += '<button class="quick-filter" type="button" data-category="' + esc(categories[c]) + '"' + tipAttr(categoryDescriptions[categories[c]]) + '>' + esc(categories[c]) + '</button>';
    }
    el('quickFilters').innerHTML = quickHtml;
  }

  function hasMatch(field, selected) {
    if (!selected) return true;
    var values = toArray(field);
    for (var i = 0; i < values.length; i++) {
      if (text(values[i]) === selected) return true;
    }
    return false;
  }

  function describeChip(textValue, context, record) {
    var value = text(textValue);
    if (context === 'category') return categoryDescriptions[value] || 'Technology category used to group related vendors and capabilities.';
    if (context === 'subcategory') return subcategoryDescriptions[value] || 'Specific application area within the broader technology category.';
    if (context === 'offering') return value + ' from ' + text(record && record.vendor) + ': ' + text(record && record.notes);
    if (context === 'contact') return 'Vendor contact for ' + text(record && record.vendor) + '.';
    return '';
  }

  function chip(textValue, className, tooltip) {
    return '<span class="chip ' + (className || '') + '"' + tipAttr(tooltip) + '>' + esc(textValue) + '</span>';
  }

  function linkChip(textValue, href, className, tooltip) {
    return '<a class="chip-link ' + (className || '') + '" href="' + esc(href) + '" target="_blank" rel="noopener noreferrer"' + tipAttr(tooltip) + '>' + esc(textValue) + '</a>';
  }

  function renderChipGroup(values, className, emptyLabel, context, record) {
    var arr = toArray(values);
    if (!arr.length) return '<div class="chips"><span class="chip empty-chip">' + esc(emptyLabel || '-') + '</span></div>';
    var out = '<div class="chips">';
    for (var i = 0; i < arr.length; i++) out += chip(arr[i], className, describeChip(arr[i], context, record));
    return out + '</div>';
  }

  function renderPhoneChips(values, emptyLabel) {
    var arr = toArray(values);
    if (!arr.length) return '<div class="chips"><span class="chip empty-chip">' + esc(emptyLabel || '-') + '</span></div>';
    var out = '<div class="chips">';
    for (var i = 0; i < arr.length; i++) {
      var v = text(arr[i]).trim();
      if (!v || v === 'XXX-XXX-XXXX') out += '<span class="chip empty-chip">-</span>';
      else out += '<a class="chip-link phone" href="' + esc(telHref(v)) + '"' + tipAttr('Call ' + v + '.') + '>' + esc(v) + '</a>';
    }
    return out + '</div>';
  }

  function renderEmailChips(values, emptyLabel) {
    var arr = toArray(values);
    if (!arr.length) return '<div class="chips"><span class="chip empty-chip">' + esc(emptyLabel || '-') + '</span></div>';
    var out = '<div class="chips">';
    for (var i = 0; i < arr.length; i++) {
      var v = text(arr[i]).trim();
      if (!v) out += '<span class="chip empty-chip">-</span>';
      else out += '<a class="chip-link email" href="mailto:' + esc(v) + '"' + tipAttr('Start an email to ' + v + '.') + '>' + esc(v) + '</a>';
    }
    return out + '</div>';
  }

  function renderWebsiteChip(value) {
    var url = text(value).trim();
    if (!url) return '<div class="chips"><span class="chip empty-chip">-</span></div>';
    return '<div class="chips">' + linkChip(compactLabelFromUrl(url), url, 'website', 'Open the vendor website in a new tab.') + '</div>';
  }

  function renderNotesChip(value) {
    var v = text(value).trim();
    if (!v) return '<div class="chips"><span class="chip empty-chip">-</span></div>';
    return '<div class="notes"' + tipAttr(v) + '>' + esc(v) + '</div>';
  }

  function filterRecords() {
    var q = text(el('search').value).toLowerCase().trim();
    var category = text(el('category').value);
    var subcategory = text(el('subcategory').value);
    var vendor = text(el('vendor').value);
    var contact = text(el('contact').value);
    var offering = text(el('offering').value);

    return records.filter(function (r) {
      if (q && searchBlob(r).indexOf(q) === -1) return false;
      if (!hasMatch(r.category, category)) return false;
      if (!hasMatch(r.subcategory, subcategory)) return false;
      if (!hasMatch(r.vendor, vendor)) return false;
      if (!hasMatch(r.contact, contact)) return false;
      if (!hasMatch(r.offerings, offering)) return false;
      return true;
    });
  }

  function sortRecords(list) {
    var field = text(el('sortBy').value) || 'vendor';
    return list.slice().sort(function(a, b) {
      var av = flattenField(a[field] || a.vendor);
      var bv = flattenField(b[field] || b.vendor);
      if (field !== 'vendor') {
        av += ' | ' + a.vendor;
        bv += ' | ' + b.vendor;
      }
      return av.localeCompare(bv);
    });
  }

  function initials(value) {
    var parts = text(value).trim().split(/\s+/);
    var first = parts[0] ? parts[0].charAt(0) : 'V';
    var second = parts.length > 1 ? parts[parts.length - 1].charAt(0) : '';
    return (first + second).toUpperCase();
  }

  function renderVideo(r) {
    if (!state.showVideos) return '';
    var video = videoCatalog[text(r.subcategory)] || videoCatalog[text(r.category)];
    if (!video || !video.id) return '';
    var title = video.label + ' for ' + text(r.subcategory || r.category);
    return ''
      + '<div class="video-panel"' + tipAttr('Embedded YouTube overview for this technology area. Use it as a quick refresher, then validate vendor-specific fit with the contact.') + '>'
      +   '<div class="video-title"><span>' + esc(video.label) + '</span><span>' + esc(r.subcategory) + '</span></div>'
      +   '<iframe class="video-frame" loading="lazy" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share" allowfullscreen referrerpolicy="strict-origin-when-cross-origin" title="' + esc(title) + '" src="https://www.youtube-nocookie.com/embed/' + esc(video.id) + '?rel=0"></iframe>'
      + '</div>';
  }

  function renderCard(r) {
    return ''
      + '<article class="panel card">'
      +   '<div class="card-head">'
      +     '<div><h3' + tipAttr(text(r.vendor) + ' provides ' + offeringsText(r) + ' for ' + text(r.subcategory) + '. ' + text(r.notes)) + '>' + esc(r.vendor) + '</h3><div class="vendor-meta">' + esc(r.category) + ' / ' + esc(r.subcategory) + '</div></div>'
      +     '<div class="vendor-mark" aria-hidden="true">' + esc(initials(r.vendor)) + '</div>'
      +   '</div>'
      +   '<div class="row"><div class="label">Category</div>' + renderChipGroup(r.category, '', '', 'category', r) + '</div>'
      +   '<div class="row"><div class="label">Subcategory</div>' + renderChipGroup(r.subcategory, '', '', 'subcategory', r) + '</div>'
      +   '<div class="row"><div class="label">Offerings</div>' + renderChipGroup(r.offerings, 'offering', '', 'offering', r) + '</div>'
      +   '<div class="row"><div class="label">Contact</div>' + renderChipGroup(r.contact, '', '', 'contact', r) + '</div>'
      +   '<div class="row"><div class="label">Phone</div>' + renderPhoneChips(r.phone) + '</div>'
      +   '<div class="row"><div class="label">Mobile</div>' + renderPhoneChips(r.mobile) + '</div>'
      +   '<div class="row"><div class="label">Email</div>' + renderEmailChips(r.email) + '</div>'
      +   '<div class="row"><div class="label">Website</div>' + renderWebsiteChip(r.website) + '</div>'
      +   '<div class="row"><div class="label">Notes</div>' + renderNotesChip(r.notes) + '</div>'
      +   renderVideo(r)
      + '</article>';
  }

  function render() {
    var filtered = sortRecords(filterRecords());
    var cardsHtml = '';
    for (var i = 0; i < filtered.length; i++) cardsHtml += renderCard(filtered[i]);
    el('cards').innerHTML = cardsHtml;
    el('cards').className = 'cards' + (state.compact ? ' compact' : '');
    el('visibleCount').textContent = String(filtered.length);
    el('totalCount').textContent = String(records.length);
    el('categoryCount').textContent = String(uniq(filtered.map(function(r) { return r.category; })).length);
    el('vendorCount').textContent = String(uniq(filtered.map(function(r) { return r.vendor; })).length);
    el('empty').style.display = filtered.length ? 'none' : 'block';
    updateQuickFilters();
    el('videoBtn').className = state.showVideos ? 'is-active' : '';
    el('videoBtn').textContent = state.showVideos ? 'Hide videos' : 'Show videos';
    el('compactBtn').className = state.compact ? 'is-active' : '';
  }

  function bind() {
    var ids = ['search', 'category', 'subcategory', 'vendor', 'contact', 'offering', 'sortBy'];
    for (var i = 0; i < ids.length; i++) {
      el(ids[i]).addEventListener(ids[i] === 'search' ? 'input' : 'change', render);
    }
    el('clearBtn').addEventListener('click', function () {
      el('search').value = '';
      el('category').value = '';
      el('subcategory').value = '';
      el('vendor').value = '';
      el('contact').value = '';
      el('offering').value = '';
      el('sortBy').value = 'vendor';
      state.showVideos = false;
      state.compact = false;
      render();
    });
    el('videoBtn').addEventListener('click', function () {
      state.showVideos = !state.showVideos;
      render();
    });
    el('compactBtn').addEventListener('click', function () {
      state.compact = !state.compact;
      render();
    });
    el('exportBtn').addEventListener('click', exportVisibleCsv);
    el('quickFilters').addEventListener('click', function (event) {
      var button = event.target.closest('button[data-category]');
      if (!button) return;
      el('category').value = button.getAttribute('data-category') || '';
      render();
    });
  }

  function updateQuickFilters() {
    var selected = text(el('category').value);
    var buttons = el('quickFilters').querySelectorAll('button[data-category]');
    for (var i = 0; i < buttons.length; i++) {
      buttons[i].className = 'quick-filter' + (buttons[i].getAttribute('data-category') === selected ? ' is-active' : '');
    }
  }

  function csvCell(value) {
    var v = text(value).replace(/\r?\n/g, ' ');
    return '"' + v.replace(/"/g, '""') + '"';
  }

  function exportVisibleCsv() {
    var filtered = sortRecords(filterRecords());
    var rows = [['Category', 'Subcategory', 'Vendor', 'Contact', 'Phone', 'Mobile', 'Email', 'Website', 'Offerings', 'Notes']];
    for (var i = 0; i < filtered.length; i++) {
      var r = filtered[i];
      rows.push([
        r.category,
        r.subcategory,
        r.vendor,
        flattenField(r.contact),
        flattenField(r.phone),
        flattenField(r.mobile),
        flattenField(r.email),
        r.website,
        offeringsText(r),
        r.notes
      ]);
    }
    var csv = rows.map(function(row) { return row.map(csvCell).join(','); }).join('\n');
    var blob = new Blob([csv], { type: 'text/csv;charset=utf-8' });
    var url = URL.createObjectURL(blob);
    var a = document.createElement('a');
    a.href = url;
    a.download = 'vendor-directory-visible.csv';
    document.body.appendChild(a);
    a.click();
    a.remove();
    URL.revokeObjectURL(url);
  }

  populateFilters();
  bind();
  render();
}());
</script>
